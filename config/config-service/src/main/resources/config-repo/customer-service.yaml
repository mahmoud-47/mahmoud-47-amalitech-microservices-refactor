server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-long-enough-for-hs256}
    expiration-ms: 86400000  # 24 hours

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5433/customer_db
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers