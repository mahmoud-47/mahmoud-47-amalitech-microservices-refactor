server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-long-enough-for-hs256}
    expiration-ms: 86400000  # 24 hours

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5433/customer_db
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${DB_POOL_NAME:BloggingHikariPool}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      keepalive-time: ${DB_KEEPALIVE_TIME:300000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD:2000}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers