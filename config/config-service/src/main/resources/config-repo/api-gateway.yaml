server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-long-enough-for-hs256}
    expiration-ms: 86400000  # 24 hours

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:redis123}

#  data:
#    redis:
#      host: ${REDIS_HOST:localhost}
#      port: 6379
#      password: ${REDIS_PASSWORD:redis123}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/customers/**,/api/auth/**

        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/deliveries/**

        # ── Smoke test hello routes ───────────────────────────────────────────
        - id: customer-hello
          uri: lb://customer-service
          predicates:
            - Path=/hello/customer
          filters:
            - RewritePath=/hello/customer, /hello

        - id: restaurant-hello
          uri: lb://restaurant-service
          predicates:
            - Path=/hello/restaurant
          filters:
            - RewritePath=/hello/restaurant, /hello

        - id: order-hello
          uri: lb://order-service
          predicates:
            - Path=/hello/order
          filters:
            - RewritePath=/hello/order, /hello

        - id: delivery-hello
          uri: lb://delivery-service
          predicates:
            - Path=/hello/delivery
          filters:
            - RewritePath=/hello/delivery, /hello

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG
    com.fooddelivery.apigateway: DEBUG   # your own package